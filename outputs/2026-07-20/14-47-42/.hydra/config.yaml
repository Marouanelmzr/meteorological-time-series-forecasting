model:
  _target_: src.models.classification.logistic_regression.LogisticRegressionModel
  penalty: l2
  C: 1.0
  solver: lbfgs
  max_iter: 1000
  class_weight: balanced
  random_state: ${seed}
dataset:
  _target_: src.data.dataset.Dataset
  data_dir: data/processed/splits
  target: has_gust
  feature_columns: ${features.columns}
  metadata_columns:
  - station_id
  - icao
  - station_name
  - run_time
  - valid_time
  - lead_time
trainer:
  save_model: true
  save_predictions: true
  save_plots: true
  verbose: true
evaluation:
  positive_label: 1
  probability_threshold: 0.5
  compute_curves: true
  save_plots: true
features:
  name: arome
  columns:
  - arome_lon
  - arome_lat
  - station_lon
  - station_lat
  - elevation_m
  - distance_km
  - lead_time
  - doy_sin
  - doy_cos
  - hour_sin
  - hour_cos
  - u10
  - v10
  - arome_wind10_speed
  - arome_wind10_dir
  - u850
  - v850
  - arome_wind850_speed
  - arome_wind850_dir
  - u950
  - v950
  - arome_wind950_speed
  - arome_wind950_dir
  - t2m
  - rh2m
  - psurf
  - pblh
  - tke20m
  - edr20m
  - u_gust60
  - v_gust60
  - arome_gust60_speed
  - arome_gust60_dir
  - wind_shear_950_10
wandb:
  enabled: true
  project: meteorological-time-series-forecasting
  entity: null
  group: classification
  tags:
  - baseline
  notes: ''
  mode: online
  run_name: ${experiment_name}
paths:
  models_dir: outputs/models
  plots_dir: outputs/plots
  metrics_dir: outputs/metrics
  predictions_dir: outputs/predictions
task: classification
target: has_gust
seed: 42
experiment_name: logistic_regression_baseline
